name: Promote MCGateway Test to Stable

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm test image exists
        run: |
          docker buildx imagetools inspect \
            ghcr.io/jaxdoesit/mcgateway-broadcast:test

      - name: Promote exact test image to stable
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/jaxdoesit/mcgateway-broadcast:stable \
            ghcr.io/jaxdoesit/mcgateway-broadcast:test

      - name: Verify stable image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/jaxdoesit/mcgateway-broadcast:stable
