name: Build MCGateway Test Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-image:
    runs-on: ubuntu-latest

    steps:
      - name: Download latest official MCXboxBroadcast source
        uses: actions/checkout@v6
        with:
          repository: MCXboxBroadcast/Broadcaster
          ref: master
          fetch-depth: 0

      - name: Apply MCGateway friends remove patch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "MCGateway Build Bot"
          git config user.email "actions@users.noreply.github.com"

          git fetch \
            https://github.com/JaxDoesIt/Broadcaster-unfollow.git \
            friends-remove-command

          git cherry-pick 238afbd

          grep -Fq \
            'friends remove <xuid>' \
            bootstrap/standalone/src/main/java/com/rtm516/mcxboxbroadcast/bootstrap/standalone/StandaloneLoggerImpl.java

          echo "MCGateway friend removal patch applied successfully."

      - name: Determine current MCXboxBroadcast build
        shell: bash
        run: |
          set -euo pipefail

          BUILD_NUMBER="$(
            git tag --list \
              | grep -E '^[0-9]+$' \
              | sort -V \
              | tail -n 1
          )"

          if [[ -z "$BUILD_NUMBER" ]]; then
            echo "Could not determine the current build number."
            exit 1
          fi

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Building MCXboxBroadcast Build $BUILD_NUMBER with MCGateway friend removal support."

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-home-cache-cleanup: true

      - name: Build patched Standalone JAR
        shell: bash
        run: |
          set -euo pipefail

          ./gradlew build

          JAR="bootstrap/standalone/build/libs/MCXboxBroadcastStandalone.jar"

          if [[ ! -s "$JAR" ]]; then
            echo "The Standalone JAR was not created."
            exit 1
          fi

          jar tf "$JAR" >/dev/null

          echo "Patched Standalone JAR built successfully."
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bootstrap/standalone/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/jaxdoesit/mcgateway-broadcast:test
          labels: |
            org.opencontainers.image.source=https://github.com/JaxDoesIt/Broadcaster-unfollow
            org.opencontainers.image.description=MCXboxBroadcast with MCGateway friend removal support
